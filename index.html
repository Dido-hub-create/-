<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Органайзър</title>
<meta name="theme-color" content="#0a1420">

<!-- PWA: манифест и икони -->
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
<link rel="apple-touch-icon" href="./icon-192.png">

<!-- Android / Chrome "installable" мета -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="Органайзър">

<!-- iOS Add to Home Screen поведение -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Органайзър">

<style>
:root{
  --bg-0:#070d17;
  --bg-1:#0d1b2e;
  --bg-2:#122540;
  --panel:#eef1e8;
  --panel-2:#ffffff;
  --panel-border:#d7dcc9;
  --ink:#182233;
  --ink-soft:#4c5769;
  --accent:#c3e14a;
  --accent-2:#7fce6c;
  --accent-ink:#1c2b0e;
  --danger:#e0596b;
  --warn:#e6b84d;
  --line:rgba(255,255,255,0.08);
  --text-hi:#eef2f7;
  --text-mid:#9fb0c6;
  --radius:14px;
  --radius-sm:9px;
  --shadow:0 8px 30px rgba(0,0,0,0.35);
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font);
  background:
    radial-gradient(ellipse at top left, #14294a 0%, transparent 55%),
    radial-gradient(ellipse at bottom right, #0f2035 0%, transparent 60%),
    var(--bg-0);
  color:var(--text-hi);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:#233754;border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}

a{color:var(--accent);}

/* ---------- App Shell ---------- */
#app{display:flex;min-height:100vh;}

.sidebar{
  width:230px;flex-shrink:0;
  background:linear-gradient(180deg,var(--bg-1),var(--bg-0));
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;
  padding:20px 14px;
  position:sticky;top:0;height:100vh;
}
.brand{
  display:flex;align-items:center;gap:10px;
  padding:6px 8px 22px 8px;
}
.brand-mark{
  width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  display:flex;align-items:center;justify-content:center;
  font-weight:800;color:var(--accent-ink);font-size:16px;
  flex-shrink:0;
}
.brand-name{font-weight:700;font-size:16px;letter-spacing:0.2px;}
.brand-sub{font-size:11px;color:var(--text-mid);margin-top:1px;}

.nav{display:flex;flex-direction:column;gap:3px;flex:1;overflow-y:auto;}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:10px;
  color:var(--text-mid);cursor:pointer;
  font-size:14px;font-weight:500;
  border:1px solid transparent;
  transition:background .15s,color .15s;
  user-select:none;
}
.nav-item:hover{background:var(--bg-2);color:var(--text-hi);}
.nav-item.active{
  background:linear-gradient(90deg, rgba(195,225,74,0.16), rgba(195,225,74,0.03));
  color:var(--accent);
  border-color:rgba(195,225,74,0.25);
}
.nav-icon{width:18px;text-align:center;font-size:15px;flex-shrink:0;}
.nav-badge{
  margin-left:auto;background:var(--danger);color:#fff;
  font-size:10.5px;font-weight:700;padding:1px 6px;border-radius:20px;
  min-width:18px;text-align:center;
}
.nav-footer{border-top:1px solid var(--line);padding-top:10px;margin-top:8px;font-size:11px;color:var(--text-mid);}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  display:flex;align-items:center;gap:14px;
  padding:16px 26px;border-bottom:1px solid var(--line);
  position:sticky;top:0;background:rgba(7,13,23,0.85);backdrop-filter:blur(10px);
  z-index:20;
}
.topbar h1{font-size:19px;margin:0;font-weight:700;flex-shrink:0;}
.search-box{
  flex:1;max-width:420px;position:relative;
}
.search-box input{
  width:100%;background:var(--bg-2);border:1px solid var(--line);
  color:var(--text-hi);padding:9px 12px 9px 34px;border-radius:10px;font-size:13.5px;
  outline:none;
}
.search-box input:focus{border-color:var(--accent);}
.search-box .ic{position:absolute;left:11px;top:9px;color:var(--text-mid);font-size:14px;}
.topbar-actions{display:flex;gap:8px;margin-left:auto;flex-shrink:0;}
.menu-btn{display:none;background:none;border:1px solid var(--line);color:var(--text-hi);border-radius:9px;padding:8px 10px;cursor:pointer;}

.content{padding:22px 26px 60px;flex:1;}
.hidden{display:none !important;}

/* ---------- Buttons ---------- */
.btn{
  border:none;border-radius:10px;padding:9px 16px;font-size:13.5px;font-weight:600;
  cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:transform .1s, filter .15s;
}
.btn:active{transform:scale(0.97);}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:var(--accent-ink);}
.btn-primary:hover{filter:brightness(1.08);}
.btn-ghost{background:var(--bg-2);color:var(--text-hi);border:1px solid var(--line);}
.btn-ghost:hover{background:#16283f;}
.btn-danger{background:rgba(224,89,107,0.15);color:#ff8fa0;border:1px solid rgba(224,89,107,0.35);}
.btn-danger:hover{background:rgba(224,89,107,0.25);}
.btn-sm{padding:6px 11px;font-size:12.5px;border-radius:8px;}
.icon-btn{
  background:transparent;border:1px solid var(--line);color:var(--text-mid);
  width:32px;height:32px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;flex-shrink:0;
}
.icon-btn:hover{background:var(--bg-2);color:var(--text-hi);}

/* ---------- Cards / Panels ---------- */
.panel{
  background:linear-gradient(180deg,var(--panel-2),var(--panel));
  border-radius:var(--radius);
  border:1px solid var(--panel-border);
  color:var(--ink);
  box-shadow:var(--shadow);
}
.panel-pad{padding:18px 20px;}
.section-title{
  font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-mid);
  font-weight:700;margin:0 0 12px 2px;
}
.grid{display:grid;gap:16px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr);} .grid-3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:640px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr;}}

.stat-card{padding:16px 18px;}
.stat-top{display:flex;justify-content:space-between;align-items:flex-start;}
.stat-num{font-size:28px;font-weight:800;color:var(--ink);line-height:1;margin-top:6px;}
.stat-label{font-size:12.5px;color:var(--ink-soft);font-weight:600;}
.stat-ic{
  width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}

.dash-cols{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;margin-top:18px;}
@media(max-width:980px){.dash-cols{grid-template-columns:1fr;}}

/* ---------- List rows (tasks/payments/etc) ---------- */
.row-list{display:flex;flex-direction:column;gap:8px;}
.item-row{
  background:var(--panel-2);border:1px solid var(--panel-border);border-radius:var(--radius-sm);
  padding:12px 14px;display:flex;align-items:flex-start;gap:12px;color:var(--ink);
  position:relative;
}
.item-row.done{opacity:0.55;}
.item-row.overdue{border-left:4px solid var(--danger);}
.checkbox{
  width:20px;height:20px;border-radius:6px;border:2px solid #b7bfa4;
  flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  background:#fff;transition:.15s;
}
.checkbox.checked{background:var(--accent-2);border-color:var(--accent-2);color:#fff;font-size:12px;}
.item-body{flex:1;min-width:0;}
.item-title-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.item-title{font-weight:700;font-size:14.5px;}
.item-title.strike{text-decoration:line-through;}
.tag{
  font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:0.3px;
  text-transform:uppercase;
}
.tag-critical{background:rgba(224,89,107,0.16);color:#c23b52;}
.tag-important{background:rgba(230,184,77,0.2);color:#93711c;}
.tag-normal{background:rgba(127,206,108,0.18);color:#3c7a2e;}
.tag-cat{background:#e6e9dc;color:#495436;}
.item-meta{font-size:12px;color:var(--ink-soft);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap;}
.item-desc{font-size:12.5px;color:var(--ink-soft);margin-top:5px;}
.item-actions{display:flex;gap:6px;flex-shrink:0;align-items:center;}
.empty-state{
  text-align:center;padding:40px 20px;color:var(--text-mid);
}
.empty-state .ic{font-size:34px;margin-bottom:10px;}

/* ---------- Forms / Modal ---------- */
.modal-overlay{
  position:fixed;inset:0;background:rgba(3,7,14,0.6);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;
}
.modal{
  background:var(--panel-2);color:var(--ink);border-radius:16px;width:100%;max-width:520px;
  max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.modal-head{
  padding:18px 22px;border-bottom:1px solid var(--panel-border);display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;background:var(--panel-2);border-radius:16px 16px 0 0;
}
.modal-head h3{margin:0;font-size:16.5px;}
.modal-body{padding:20px 22px;}
.modal-foot{padding:16px 22px;border-top:1px solid var(--panel-border);display:flex;justify-content:flex-end;gap:8px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--ink-soft);margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;padding:9px 11px;border-radius:9px;border:1.5px solid #d3d8c5;background:#fff;
  font-size:13.5px;color:var(--ink);font-family:inherit;outline:none;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent-2);}
.field textarea{resize:vertical;min-height:60px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.chip-group{display:flex;gap:6px;flex-wrap:wrap;}
.chip{
  padding:6px 12px;border-radius:20px;border:1.5px solid #d3d8c5;background:#fff;font-size:12.5px;
  cursor:pointer;font-weight:600;color:var(--ink-soft);
}
.chip.selected{background:var(--ink);color:#fff;border-color:var(--ink);}
.chip.selected.pri-critical{background:var(--danger);border-color:var(--danger);}
.chip.selected.pri-important{background:var(--warn);border-color:var(--warn);color:#4a3707;}
.chip.selected.pri-normal{background:var(--accent-2);border-color:var(--accent-2);}
.reminder-list{display:flex;flex-direction:column;gap:6px;}
.reminder-opt{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);}

/* ---------- Toast ---------- */
#toast-wrap{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{
  background:var(--bg-2);color:var(--text-hi);border:1px solid var(--line);
  padding:12px 16px;border-radius:10px;box-shadow:var(--shadow);font-size:13.5px;
  display:flex;align-items:center;gap:10px;min-width:230px;
  animation:toastIn .2s ease;
}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.toast.ok{border-left:4px solid var(--accent-2);}
.toast.err{border-left:4px solid var(--danger);}

/* ---------- Calendar ---------- */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-dow{font-size:11px;color:var(--text-mid);text-align:center;font-weight:700;padding-bottom:4px;}
.cal-cell{
  background:var(--panel-2);border:1px solid var(--panel-border);border-radius:9px;min-height:74px;
  padding:6px;font-size:11.5px;color:var(--ink);position:relative;
}
.cal-cell.other{opacity:0.35;}
.cal-cell.today{border-color:var(--accent-2);border-width:2px;}
.cal-daynum{font-weight:700;font-size:12px;}
.cal-pay{
  margin-top:3px;background:rgba(224,89,107,0.14);color:#a23246;border-radius:5px;padding:1px 4px;
  font-size:10px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* ---------- Filters bar ---------- */
.filters-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
.filters-bar select,.filters-bar input[type=text]{
  background:var(--bg-2);border:1px solid var(--line);color:var(--text-hi);
  padding:8px 10px;border-radius:9px;font-size:13px;outline:none;
}

/* misc */
.text-muted{color:var(--text-mid);}
.mt-0{margin-top:0;}
.flex{display:flex;}
.gap-8{gap:8px;}
.between{justify-content:space-between;}
.center-y{align-items:center;}

@media(max-width:860px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);transition:transform .2s;z-index:90;box-shadow:20px 0 40px rgba(0,0,0,0.4);}
  .sidebar.open{transform:translateX(0);}
  .menu-btn{display:inline-flex;}
  .topbar{padding:12px 14px;}
  .content{padding:16px 14px 50px;}
  .search-box{max-width:none;}
  .topbar h1{display:none;}
  .sidebar-scrim{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:80;}
}
</style>
</head>
<body>

<div id="app">
  <div class="sidebar-scrim hidden" id="scrim"></div>
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">О</div>
      <div>
        <div class="brand-name">Органайзър</div>
        <div class="brand-sub">личен асистент</div>
      </div>
    </div>
    <nav class="nav" id="navList"></nav>
    <div class="nav-footer">Всички данни се пазят офлайн, на това устройство.</div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="menu-btn" id="menuBtn">☰</button>
      <h1 id="pageTitle">Табло</h1>
      <div class="search-box">
        <span class="ic">🔍</span>
        <input type="text" id="globalSearch" placeholder="Търси в задачи, плащания, бележки, идеи...">
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" id="notifBtn" title="Известия">🔔</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div id="toast-wrap"></div>
<div id="modalRoot"></div>

<script>
/* =========================================================
   ОРГАНАЙЗЪР — единствен офлайн файл (localStorage + PWA)
   ========================================================= */

/* ---------------------- Константи ---------------------- */
const STORAGE_KEY = 'organizer_data_v1';
const DEFAULT_CATEGORIES = ['Финанси','Училище','Спорт','Дом','Автомобил','Здраве','Покупки','Проекти','Идеи'];
const PRIORITIES = [
  {id:'critical', label:'Критично', cls:'tag-critical', chipCls:'pri-critical'},
  {id:'important', label:'Важно', cls:'tag-important', chipCls:'pri-important'},
  {id:'normal', label:'Нормално', cls:'tag-normal', chipCls:'pri-normal'}
];
const REMINDER_OPTIONS = [
  {id:'30d', label:'30 дни преди', ms:30*24*3600*1000},
  {id:'14d', label:'14 дни преди', ms:14*24*3600*1000},
  {id:'7d', label:'7 дни преди', ms:7*24*3600*1000},
  {id:'3d', label:'3 дни преди', ms:3*24*3600*1000},
  {id:'1d', label:'1 ден преди', ms:1*24*3600*1000},
  {id:'1h', label:'1 час преди', ms:3600*1000},
  {id:'custom', label:'Персонализирано', ms:null}
];
const REPEAT_OPTIONS = [
  {id:'once', label:'Еднократно'},
  {id:'daily', label:'Ежедневно'},
  {id:'weekly', label:'Седмично'},
  {id:'monthly', label:'Месечно'},
  {id:'yearly', label:'Годишно'},
  {id:'custom', label:'Персонализиран интервал (дни)'}
];
const SNOOZE_OPTIONS = [
  {id:'1d', label:'1 ден', ms:1*24*3600*1000},
  {id:'3d', label:'3 дни', ms:3*24*3600*1000},
  {id:'1w', label:'1 седмица', ms:7*24*3600*1000},
  {id:'1m', label:'1 месец', ms:30*24*3600*1000}
];
const MONTHS_BG = ['Януари','Февруари','Март','Април','Май','Юни','Юли','Август','Септември','Октомври','Ноември','Декември'];
const DOW_BG = ['Пон','Вт','Ср','Чет','Пет','Съб','Нед'];

/* ---------------------- Помощни функции ---------------------- */
function uid(){ return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,9); }
function nowISO(){ return new Date().toISOString(); }
function fmtDate(d){
  if(!d) return '';
  const dt = new Date(d);
  if(isNaN(dt)) return d;
  return dt.toLocaleDateString('bg-BG',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function fmtDateTime(d,t){
  if(!d) return '';
  return fmtDate(d) + (t? ', '+t+'ч.' : '');
}
function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function daysBetween(a,b){
  const A = new Date(a); A.setHours(0,0,0,0);
  const B = new Date(b); B.setHours(0,0,0,0);
  return Math.round((A-B)/(24*3600*1000));
}
function escapeHtml(s){
  if(s==null) return '';
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function toast(msg, type){
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = 'toast ' + (type==='err'?'err':'ok');
  el.innerHTML = (type==='err'?'⚠️ ':'✓ ') + escapeHtml(msg);
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 3200);
}

/* ---------------------- Data layer ---------------------- */
let DB = null;

function defaultDB(){
  return {
    tasks: [],
    payments: [],
    notes: [],
    ideas: [],
    reminders: [],
    categories: DEFAULT_CATEGORIES.slice(),
    meta: { lastCheck: null, notifPermissionAsked:false }
  };
}

function loadDB(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw){ DB = defaultDB(); saveDB(); return; }
    const parsed = JSON.parse(raw);
    DB = Object.assign(defaultDB(), parsed);
    if(!DB.categories || !DB.categories.length) DB.categories = DEFAULT_CATEGORIES.slice();
  }catch(e){
    console.error('Грешка при зареждане на данните', e);
    DB = defaultDB();
  }
}
function saveDB(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));
  }catch(e){
    console.error(e);
    toast('Грешка при запис на данните (възможно е паметта да е пълна).', 'err');
  }
}

/* ---------------------- Router / Nav ---------------------- */
const NAV_ITEMS = [
  {id:'dashboard', label:'Табло', icon:'🏠'},
  {id:'tasks', label:'Задачи', icon:'✅'},
  {id:'reminders', label:'Напомняния', icon:'⏰'},
  {id:'payments', label:'Плащания', icon:'💳'},
  {id:'notes', label:'Бележки', icon:'🗒️'},
  {id:'ideas', label:'Идеи', icon:'💡'},
  {id:'archive', label:'Архив', icon:'🗂️'},
  {id:'stats', label:'Статистика', icon:'📊'},
  {id:'settings', label:'Настройки и backup', icon:'⚙️'}
];
let currentView = 'dashboard';

function renderNav(){
  const nav = document.getElementById('navList');
  nav.innerHTML = NAV_ITEMS.map(item=>{
    let badge = '';
    if(item.id==='tasks'){
      const n = countOverdueTasks();
      if(n>0) badge = `<span class="nav-badge">${n}</span>`;
    }
    if(item.id==='payments'){
      const n = countDuePaymentsSoon();
      if(n>0) badge = `<span class="nav-badge">${n}</span>`;
    }

      goTo(el.dataset.view);
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('scrim').classList.add('hidden');
    });
  });

/* =========================================================
   ИЗВЕСТИЯ / ПРОВЕРКА НА НАБЛИЖАВАЩИ СЪБИТИЯ
   ========================================================= */
function requestNotificationPermission(){
  if(!('Notification' in window)){ toast('Този браузър не поддържа известия.', 'err'); return; }
  Notification.requestPermission().then(perm=>{
    DB.meta.notifPermissionAsked = true;
    saveDB();
    if(perm==='granted') toast('Известията са разрешени.');
    else toast('Известията са отказани от браузъра.', 'err');
  });
}
function fireNotification(title, body){
  if('Notification' in window && Notification.permission==='granted'){
    try{ new Notification(title, {body, icon: FAVICON_DATA_URL}); }catch(e){ console.warn(e); }
  }
  toast(title + (body?' — '+body:''));
}
function msUntil(dateStr, timeStr){
  if(!dateStr) return null;
  const dt = new Date(dateStr + 'T' + (timeStr||'09:00') + ':00');
  return dt.getTime() - Date.now();
}
/* Проверява задачи, плащания и напомняния за близки/просрочени срокове.
   Извиква се при всяко стартиране и периодично, докато приложението е отворено. */
function checkDueItems(auto){
  const notifiedSet = new Set(JSON.parse(localStorage.getItem('organizer_notified_v1')||'[]'));
  const toNotify = [];

  DB.tasks.forEach(t=>{
    if(t.done||t.archived) return;
    (t.reminders||[]).forEach(rid=>{
      const opt = REMINDER_OPTIONS.find(o=>o.id===rid);
      if(!opt || !opt.ms) return;
      const due = taskDueDate(t);
      if(!due) return;
      const target = new Date(due+'T'+(t.time||'09:00')+':00').getTime() - opt.ms;
      const key = 'task_'+t.id+'_'+rid;
      if(Date.now() >= target && !notifiedSet.has(key)){
        toNotify.push({key, title:'Задача: '+t.title, body:opt.label});
      }
    });
  });
  DB.payments.forEach(p=>{
    if(p.done||p.archived) return;
    (p.reminders||[]).forEach(rid=>{
      const opt = REMINDER_OPTIONS.find(o=>o.id===rid);
      if(!opt || !opt.ms) return;
      const due = paymentDueDate(p);
      if(!due) return;
      const target = new Date(due+'T09:00:00').getTime() - opt.ms;
      const key = 'pay_'+p.id+'_'+rid;
      if(Date.now() >= target && !notifiedSet.has(key)){
        toNotify.push({key, title:'Плащане: '+p.title, body:opt.label});
      }
    });
  });
  DB.reminders.forEach(r=>{
    if(!r.active || !r.date) return;
    const target = new Date(r.date+'T'+(r.time||'09:00')+':00').getTime();
    const key = 'rem_'+r.id+'_'+r.date+'_'+r.time;
    if(Date.now() >= target && !notifiedSet.has(key)){
      toNotify.push({key, title:'Напомняне: '+r.title, body:''});
      advanceRepeatingReminder(r);
    }
  });

  toNotify.forEach(n=>{ fireNotification(n.title, n.body); notifiedSet.add(n.key); });
  if(toNotify.length){
    localStorage.setItem('organizer_notified_v1', JSON.stringify(Array.from(notifiedSet)));
    saveDB();
    renderNav();
    if(currentView) render();
  }
  DB.meta.lastCheck = nowISO();
  if(!auto) saveDB();
}
function advanceRepeatingReminder(r){
  if(r.repeat==='once' || !r.repeat) return;
  const base = new Date(r.date+'T'+(r.time||'09:00')+':00');
  if(r.repeat==='daily') base.setDate(base.getDate()+1);
  else if(r.repeat==='weekly') base.setDate(base.getDate()+7);
  else if(r.repeat==='monthly') base.setMonth(base.getMonth()+1);
  else if(r.repeat==='yearly') base.setFullYear(base.getFullYear()+1);
  else if(r.repeat==='custom') base.setDate(base.getDate()+(r.intervalDays||7));
  r.date = base.toISOString().slice(0,10);
  r.time = base.toISOString().slice(11,16);
}

/* =========================================================
   PWA: manifest.json (реален файл, вижте <head>) + service worker
   Забележка: Service Worker изисква https:// или localhost —
   при отваряне направо от файл (file://) приложението пак работи
   изцяло (localStorage, известия и т.н.), но истинска
   инсталируемост ("Add to Home Screen" с офлайн кеш) изисква
   файловете да са качени на уеб сървър (дори локален, напр.
   `python -m http.server`, или GitHub Pages/Netlify).
   ========================================================= */
const FAVICON_DATA_URL = "./icon-192.png";
function registerServiceWorker(){
  if(!('serviceWorker' in navigator)) return;
  if(!(location.protocol==='https:' || location.hostname==='localhost' || location.hostname==='127.0.0.1')){
    console.info('Service Worker пропуснат: изисква се https:// или localhost.');
    return;
  }
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js', {scope:'./'})
      .then(reg=>{ console.info('Service Worker регистриран, scope:', reg.scope); })
      .catch(err=>{ console.warn('Service Worker регистрацията се провали', err); });
  });
}

function initApp(){
  loadDB();
  wireGlobalUI();
  registerServiceWorker();
  renderNav();
  render();
  // Известия при първо стартиране
  if(!DB.meta.notifPermissionAsked && 'Notification' in window && Notification.permission==='default'){
    setTimeout(()=>{
      if(confirm('Органайзърът иска да ти изпраща известия за задачи, плащания и напомняния. Разреши ли?')){
        requestNotificationPermission();
      } else {
        DB.meta.notifPermissionAsked = true; saveDB();
      }
    }, 800);
  }
  // Автоматична ежедневна проверка при всяко стартиране
  checkDueItems(false);
  // Периодична проверка на всеки 5 минути, докато приложението е отворено
  setInterval(()=>checkDueItems(true), 5*60*1000);
}
document.addEventListener('DOMContentLoaded', initApp);

function render(){
  const c = document.getElementById('content');
  switch(currentView){
    case 'dashboard': c.innerHTML = viewDashboard(); bindDashboard(); break;

    case 'reminders': c.innerHTML = viewReminders(); bindReminders(); break;

    case 'ideas': c.innerHTML = viewIdeas(); bindIdeas(); break;
    case 'archive': c.innerHTML = viewArchive(); bindArchive(); break;
    case 'stats': c.innerHTML = viewStats(); break;

function renderCatChips(){
  const wrap = document.getElementById('catChips');

  `).join('');
  wrap.querySelectorAll('[data-cat]').forEach(x=>{

  renderCatChips();
  document.getElementById('exportBtn').addEventListener('click', exportData);
  document.getElementById('importBtn').addEventListener('click', ()=>document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change', importData);

    if(!v) return;
    if(DB.categories.includes(v)){ toast('Категорията вече съществува.', 'err'); return; }
    DB.categories.push(v); saveDB();
    document.getElementById('newCatInput').value='';
    renderCatChips();
    toast('Категорията е добавена.');
  });

function exportData(){
  const blob = new Blob([JSON.stringify(DB, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `organizer-backup-${stamp}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('Файлът е изтеглен.');
}
function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const parsed = JSON.parse(reader.result);
      if(!parsed || typeof parsed !== 'object') throw new Error('invalid');
      if(!confirm('Импортът ще замени всички текущи данни в приложението. Продължи ли?')) return;
      DB = Object.assign(defaultDB(), parsed);
      saveDB();
      render(); renderNav();
      toast('Данните са възстановени успешно.');
    }catch(err){
      toast('Файлът не е валиден JSON backup.', 'err');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function countDuePaymentsSoon(){
  const t = new Date(); t.setHours(0,0,0,0);
  const soon = new Date(t); soon.setDate(soon.getDate()+7);
  return DB.payments.filter(p=>{
    if(p.done||p.archived) return false;
    const d = new Date(paymentDueDate(p));
    return d <= soon;
  }).length;
}
function paymentDueDate(p){ return p.snoozedUntil || p.dueDate; }
function isPaymentOverdue(p){
  if(p.done||p.archived) return false;
  const d = paymentDueDate(p);
  return d && d < todayStr();
}
function upsertPayment(data, id){
  if(id){ Object.assign(DB.payments.find(x=>x.id===id), data); }
  else DB.payments.push(Object.assign({id:uid(), done:false, archived:false, createdAt:nowISO(), snoozedUntil:null}, data));
  saveDB();
}
function deletePayment(id){ DB.payments = DB.payments.filter(x=>x.id!==id); saveDB(); }
function togglePaymentDone(id){
  const p = DB.payments.find(x=>x.id===id);
  p.done = !p.done;
  p.archived = p.done;
  p.completedAt = p.done? nowISO(): null;
  saveDB(); render(); renderNav();
}
function snoozePayment(id, ms){
  const p = DB.payments.find(x=>x.id===id);
  const base = new Date(paymentDueDate(p));
  base.setTime(base.getTime()+ms);
  p.snoozedUntil = base.toISOString().slice(0,10);
  saveDB(); render(); toast('Плащането е отложено.');
}

  </div>`;

function renderCalendar(){
  const grid = document.getElementById('calGrid');
  if(!grid) return;
  const now = new Date();
  now.setDate(1);
  now.setMonth(now.getMonth()+calMonthOffset);
  const label = document.getElementById('calLabel');
  label.textContent = MONTHS_BG[now.getMonth()] + ' ' + now.getFullYear();
  const firstDow = (now.getDay()+6)%7; // Monday=0
  const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const prevDays = new Date(now.getFullYear(), now.getMonth(), 0).getDate();
  const cells = [];
  for(let i=firstDow-1;i>=0;i--) cells.push({d:prevDays-i, other:true});
  for(let d=1; d<=daysInMonth; d++) cells.push({d, other:false, month:now.getMonth(), year:now.getFullYear()});
  while(cells.length%7!==0) cells.push({d:cells.length, other:true});
  const t = todayStr();
  const dowHtml = DOW_BG.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const cellsHtml = cells.map(c=>{
    if(c.other) return `<div class="cal-cell other"><div class="cal-daynum">${c.d}</div></div>`;
    const dateStr = c.year+'-'+String(c.month+1).padStart(2,'0')+'-'+String(c.d).padStart(2,'0');
    const isToday = dateStr===t;
    const pays = DB.payments.filter(p=>!p.archived && paymentDueDate(p)===dateStr);
    return `<div class="cal-cell ${isToday?'today':''}">
      <div class="cal-daynum">${c.d}</div>
      ${pays.slice(0,2).map(p=>`<div class="cal-pay" title="${escapeHtml(p.title)}">${escapeHtml(p.title)}</div>`).join('')}
      ${pays.length>2?`<div class="cal-pay">+${pays.length-2} още</div>`:''}
    </div>`;
  }).join('');
  grid.innerHTML = dowHtml + cellsHtml;
}

  document.getElementById('calPrev').addEventListener('click', ()=>{ calMonthOffset--; renderCalendar(); });

      <div class="field"><label>Тагове (разделени със запетая)</label><input type="text" id="f_tags" value="${n?escapeHtml((n.tags||[]).join(', ')):''}"></div>
    </div>
  `;
  const foot = `<button class="btn btn-ghost" id="cancelBtn">Отказ</button><button class="btn btn-primary" id="saveBtn">${n?'Запази':'Създай'}</button>`;
  openModal(n?'Редактиране на бележка':'Нова бележка', body, foot);
  document.getElementById('cancelBtn').addEventListener('click', closeModal);
  document.getElementById('saveBtn').addEventListener('click', ()=>{
    const text = document.getElementById('f_text').value.trim();
    if(!text){ toast('Моля, въведи текст.', 'err'); return; }
    const tags = document.getElementById('f_tags').value.split(',').map(t=>t.trim()).filter(Boolean);
    upsertNote({text, category: document.getElementById('f_cat').value, tags}, id);
    closeModal(); render();
    toast(n?'Бележката е обновена.':'Бележката е създадена.');
  });
}

/* =========================================================
   ИДЕИ
   ========================================================= */
function upsertIdea(data, id){
  if(id){ Object.assign(DB.ideas.find(x=>x.id===id), data); }
  else DB.ideas.push(Object.assign({id:uid(), createdAt:nowISO()}, data));
  saveDB();
}
function deleteIdea(id){ DB.ideas = DB.ideas.filter(x=>x.id!==id); saveDB(); }
function viewIdeas(){
  return `
    <div class="flex between center-y" style="margin-bottom:16px;">
      <div class="section-title" style="margin:0;">Идеи за някой ден (${DB.ideas.length})</div>
      <button class="btn btn-primary" id="addIdeaBtn">＋ Нова идея</button>
    </div>
    <div class="grid grid-3" id="ideasGrid"></div>
  `;
}
function renderIdeasGrid(){
  const wrap = document.getElementById('ideasGrid');
  if(!wrap) return;
  let list = DB.ideas.slice().sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  if(!list.length){ wrap.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="ic">💡</div>Още няма записани идеи. Хвани вдъхновението, докато е горещо.</div>`; return; }
  wrap.innerHTML = list.map(i=>`
    <div class="panel panel-pad" data-id="${i.id}">
      <div class="flex between" style="margin-bottom:8px;">
        ${i.category?`<span class="tag tag-cat">${escapeHtml(i.category)}</span>`:'<span></span>'}
        <div class="flex gap-8">
          <button class="icon-btn btn-sm" data-action="edit">✎</button>
          <button class="icon-btn btn-sm" data-action="delete">🗑</button>
        </div>
      </div>
      <div style="font-size:13.5px;color:var(--ink);white-space:pre-wrap;">${escapeHtml(i.text)}</div>
      <div class="text-muted" style="font-size:11px;margin-top:8px;color:var(--ink-soft);">${fmtDate(i.createdAt)}</div>
    </div>
  `).join('');
  wrap.querySelectorAll('[data-id]').forEach(card=>{
    const id = card.dataset.id;
    card.querySelector('[data-action="edit"]').addEventListener('click', ()=>openIdeaModal(id));
    card.querySelector('[data-action="delete"]').addEventListener('click', ()=>{
      if(confirm('Да изтрия ли тази идея?')){ deleteIdea(id); renderIdeasGrid(); toast('Идеята е изтрита.'); }
    });

}
function bindIdeas(){
  document.getElementById('addIdeaBtn').addEventListener('click', ()=>openIdeaModal());
  renderIdeasGrid();
}
function openIdeaModal(id){
  const i = id ? DB.ideas.find(x=>x.id===id) : null;
  const body = `
    <div class="field"><label>Идея *</label><textarea id="f_text" style="min-height:100px;">${i?escapeHtml(i.text):''}</textarea></div>
    <div class="field"><label>Категория</label><select id="f_cat">${categoryOptionsHtml((i&&i.category))}</select></div>
  `;
  const foot = `<button class="btn btn-ghost" id="cancelBtn">Отказ</button><button class="btn btn-primary" id="saveBtn">${i?'Запази':'Създай'}</button>`;
  openModal(i?'Редактиране на идея':'Нова идея', body, foot);
  document.getElementById('cancelBtn').addEventListener('click', closeModal);
  document.getElementById('saveBtn').addEventListener('click', ()=>{
    const text = document.getElementById('f_text').value.trim();
    if(!text){ toast('Моля, въведи текст.', 'err'); return; }
    upsertIdea({text, category: document.getElementById('f_cat').value}, id);
    closeModal(); render();
    toast(i?'Идеята е обновена.':'Идеята е записана.');

}

/* =========================================================
   ЗАДАЧИ
   ========================================================= */
function countOverdueTasks(){
  const t = todayStr();
  return DB.tasks.filter(x=>!x.done && !x.archived && x.date && x.date < t).length;
}
function taskDueDate(task){
  return task.snoozedUntil || task.date;
}
function isTaskOverdue(task){
  if(task.done || task.archived) return false;
  const d = taskDueDate(task);
  return d && d < todayStr();
}
function upsertTask(data, id){
  if(id){
    const t = DB.tasks.find(x=>x.id===id);
    Object.assign(t, data);
  } else {
    DB.tasks.push(Object.assign({
      id: uid(), done:false, archived:false, createdAt: nowISO(), snoozedUntil:null, notifiedKeys:[]
    }, data));
  }
  saveDB();
}
function deleteTask(id){ DB.tasks = DB.tasks.filter(x=>x.id!==id); saveDB(); }
function toggleTaskDone(id){
  const t = DB.tasks.find(x=>x.id===id);
  t.done = !t.done;
  if(t.done){ t.archived = true; t.completedAt = nowISO(); }
  else { t.archived = false; t.completedAt = null; }
  saveDB(); render(); renderNav();
}
function snoozeTask(id, ms){
  const t = DB.tasks.find(x=>x.id===id);
  const base = new Date(taskDueDate(t) || todayStr());
  base.setTime(base.getTime()+ms);
  t.snoozedUntil = base.toISOString().slice(0,10);
  saveDB(); render(); toast('Задачата е отложена.');
}

function viewTasks(){
  const active = DB.tasks.filter(t=>!t.archived);
  return `
    <div class="flex between center-y" style="margin-bottom:16px;">
      <div class="section-title" style="margin:0;">Задачи (${active.length})</div>
      <button class="btn btn-primary" id="addTaskBtn">＋ Нова задача</button>
    </div>
    <div class="filters-bar">
      <select id="filterCat"><option value="">Всички категории</option>${categoryOptionsHtml()}</select>
      <select id="filterPri">
        <option value="">Всички приоритети</option>
        ${PRIORITIES.map(p=>`<option value="${p.id}">${p.label}</option>`).join('')}
      </select>
      <select id="sortTasks">
        <option value="date">Сортирай по дата</option>
        <option value="priority">Сортирай по приоритет</option>
        <option value="created">Сортирай по създаване</option>
      </select>
    </div>
    <div class="row-list" id="tasksList"></div>
  `;
}
function renderTasksList(){
  const wrap = document.getElementById('tasksList');
  if(!wrap) return;
  const cat = document.getElementById('filterCat').value;
  const pri = document.getElementById('filterPri').value;
  const sort = document.getElementById('sortTasks').value;
  let list = DB.tasks.filter(t=>!t.archived);
  if(cat) list = list.filter(t=>t.category===cat);
  if(pri) list = list.filter(t=>t.priority===pri);
  const priOrder = {critical:0,important:1,normal:2};
  list.sort((a,b)=>{
    if(sort==='priority'){
      var pa = (priOrder[a.priority]!=null) ? priOrder[a.priority] : 3;
      var pb = (priOrder[b.priority]!=null) ? priOrder[b.priority] : 3;
      return pa - pb;
    }
    if(sort==='created') return new Date(b.createdAt)-new Date(a.createdAt);
    return (taskDueDate(a)||'9999').localeCompare(taskDueDate(b)||'9999');
  });
  if(!list.length){
    wrap.innerHTML = `<div class="empty-state"><div class="ic">✅</div>Няма задачи, отговарящи на филтъра.</div>`;
    return;
  }
  wrap.innerHTML = list.map(t=>taskRowHtml(t)).join('');
  bindTaskRows(wrap);
}
function priorityTag(id){
  const p = PRIORITIES.find(x=>x.id===id) || PRIORITIES[2];
  return `<span class="tag ${p.cls}">${p.label}</span>`;
}
function taskRowHtml(t){
  const overdue = isTaskOverdue(t);
  const due = taskDueDate(t);
  return `
  <div class="item-row ${t.done?'done':''} ${overdue?'overdue':''}" data-id="${t.id}">
    <div class="checkbox ${t.done?'checked':''}" data-action="toggle">${t.done?'✓':''}</div>
    <div class="item-body">
      <div class="item-title-row">
        <span class="item-title ${t.done?'strike':''}">${escapeHtml(t.title)}</span>
        ${priorityTag(t.priority)}
        ${t.category?`<span class="tag tag-cat">${escapeHtml(t.category)}</span>`:''}
      </div>
      ${t.desc?`<div class="item-desc">${escapeHtml(t.desc)}</div>`:''}
      <div class="item-meta">
        ${due?`<span>📅 ${fmtDateTime(due, t.time)}</span>`:''}
        ${overdue?`<span style="color:#c23b52;font-weight:700;">Просрочена</span>`:''}
        ${t.snoozedUntil?`<span>⏳ отложена</span>`:''}
      </div>
    </div>
    <div class="item-actions">
      <button class="icon-btn" data-action="snooze" title="Отложи">⏳</button>
      <button class="icon-btn" data-action="edit" title="Редактирай">✎</button>
      <button class="icon-btn" data-action="delete" title="Изтрий">🗑</button>
    </div>
  </div>`;
}
function bindTaskRows(wrap){
  wrap.querySelectorAll('.item-row').forEach(row=>{
    const id = row.dataset.id;
    row.querySelector('[data-action="toggle"]').addEventListener('click', ()=>toggleTaskDone(id));
    row.querySelector('[data-action="edit"]').addEventListener('click', ()=>openTaskModal(id));
    row.querySelector('[data-action="delete"]').addEventListener('click', ()=>{
      if(confirm('Да изтрия ли тази задача?')){ deleteTask(id); renderTasksList(); renderNav(); toast('Задачата е изтрита.'); }
    });
    row.querySelector('[data-action="snooze"]').addEventListener('click', (e)=>openSnoozeMenu(e.currentTarget, id, 'task'));
  });
}
function bindTasks(){
  document.getElementById('addTaskBtn').addEventListener('click', ()=>openTaskModal());
  ['filterCat','filterPri','sortTasks'].forEach(id=>document.getElementById(id).addEventListener('change', renderTasksList));
  renderTasksList();
}
function openTaskModal(id){
  const t = id ? DB.tasks.find(x=>x.id===id) : null;
  const body = `
    <div class="field"><label>Заглавие *</label><input type="text" id="f_title" value="${t?escapeHtml(t.title):''}" placeholder="Напр. Предай тест по математика"></div>
    <div class="field"><label>Описание</label><textarea id="f_desc">${t?escapeHtml(t.desc||''):''}</textarea></div>
    <div class="field-row">
      <div class="field"><label>Категория</label><select id="f_cat">${categoryOptionsHtml((t&&t.category))}</select></div>
      <div class="field"><label>Приоритет</label><div class="chip-group" id="f_pri">${priorityChipsHtml((t&&t.priority)||'normal')}</div></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Дата</label><input type="date" id="f_date" value="${(t&&t.date)||''}"></div>
      <div class="field"><label>Час</label><input type="time" id="f_time" value="${(t&&t.time)||''}"></div>
    </div>
    <div class="field"><label>Напомняния</label><div class="reminder-list">${reminderChecksHtml((t&&t.reminders))}</div></div>
  `;
  const foot = `
    <button class="btn btn-ghost" id="cancelBtn">Отказ</button>
    <button class="btn btn-primary" id="saveBtn">${t?'Запази промените':'Създай задача'}</button>
  `;
  openModal(t?'Редактиране на задача':'Нова задача', body, foot);
  const priContainer = document.getElementById('f_pri');
  bindPriorityChips(priContainer);
  document.getElementById('cancelBtn').addEventListener('click', closeModal);
  document.getElementById('saveBtn').addEventListener('click', ()=>{
    const title = document.getElementById('f_title').value.trim();
    if(!title){ toast('Моля, въведи заглавие.', 'err'); return; }
    const data = {
      title,
      desc: document.getElementById('f_desc').value.trim(),
      category: document.getElementById('f_cat').value,
      priority: getSelectedPriority(priContainer),
      date: document.getElementById('f_date').value,
      time: document.getElementById('f_time').value,
      reminders: getCheckedReminders(document.querySelector('.reminder-list'))
    };
    upsertTask(data, id);
    closeModal();
    render(); renderNav();
    toast(t?'Задачата е обновена.':'Задачата е създадена.');
  });
}
function openSnoozeMenu(anchor, id, kind){
  const body = `<div class="row-list">${SNOOZE_OPTIONS.map(s=>`<button class="btn btn-ghost" data-snooze="${s.id}" style="width:100%;justify-content:flex-start;">Отложи с ${s.label}</button>`).join('')}</div>`;
  openModal('Отложи', body, `<button class="btn btn-ghost" id="cancelBtn">Отказ</button>`);
  document.getElementById('cancelBtn').addEventListener('click', closeModal);
  document.querySelectorAll('[data-snooze]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const opt = SNOOZE_OPTIONS.find(s=>s.id===btn.dataset.snooze);
      if(kind==='task') snoozeTask(id, opt.ms);
      if(kind==='payment') snoozePayment(id, opt.ms);
      if(kind==='reminder') snoozeReminder(id, opt.ms);
      closeModal();
    });
  });
}
